<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirdropFlow AI Dashboard</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
    .title { color: #38bdf8; font-size: 22px; font-weight: bold; }
    .status { background-color: #059669; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
    .card { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .card h3 { margin-top: 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #334155; font-size: 15px; }
    .data-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .highlight { color: #facc15; font-weight: bold; }
    .score-high { color: #10b981; font-weight: bold; }
    .score-med { color: #f59e0b; font-weight: bold; }
</style>
</head>
<body>
    <div class="header">
        <div class="title">🚀 AirdropFlow AI</div>
        <div class="status">🟢 Agent System Online</div>
    </div>
    <div class="grid">
        <div class="card">
            <h3>📊 System Analytics</h3>
            <div class="data-row"><span>Projects Scanned</span> <span>1,204</span></div>
            <div class="data-row"><span>High Priority Targets</span> <span class="highlight">12</span></div>
            <div class="data-row"><span>Tasks Executed Today</span> <span>45</span></div>
        </div>
        <div class="card">
            <h3>🤖 Latest AI Recommendations</h3>
            <div class="data-row"><span>Project Alpha (Layer 2)</span> <span class="score-high">Score: 98</span></div>
            <div class="data-row"><span>Omega Finance (DeFi)</span> <span class="score-high">Score: 92</span></div>
            <div class="data-row"><span>Nexus Protocol (GameFi)</span> <span class="score-med">Score: 75</span></div>
        </div>
    </div>
</body>
</html>
